<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ANACHRONOPE // TEMPORAL FIELD DEVICE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --void: #02030a;
  --obsidian: #070910;
  --deep: #0c0e1a;
  --surface: #111428;
  --surface-raised: #161a30;
  --amber: #e8a020;
  --amber-dim: #7a5010;
  --amber-glow: #ffb830;
  --cyan: #00e5cc;
  --cyan-dim: #004d44;
  --cyan-glow: #40ffee;
  --magenta: #cc20aa;
  --magenta-dim: #440a38;
  --red-urgent: #ff2244;
  --text-primary: #d4c8a8;
  --text-secondary: #7a7060;
  --text-dim: #3a3428;
  --trace: rgba(0,229,204,0.12);
  --trace-bright: rgba(0,229,204,0.3);
  --font-display: 'Orbitron', monospace;
  --font-body: 'Exo 2', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--void);color:var(--text-primary);font-family:var(--font-body);font-size:14px;line-height:1.5;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:1000}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 40%,rgba(0,0,0,0.6) 100%);pointer-events:none;z-index:999}
#app{max-width:420px;margin:0 auto;min-height:100vh;padding:0 0 60px 0;position:relative;background:linear-gradient(135deg,rgba(0,229,204,0.03) 0%,transparent 50%),linear-gradient(225deg,rgba(232,160,32,0.03) 0%,transparent 50%),var(--obsidian)}
.circuit-corner{position:absolute;width:40px;height:40px;pointer-events:none}
.circuit-corner::before,.circuit-corner::after{content:'';position:absolute;background:var(--cyan-dim)}
.circuit-corner.tl{top:0;left:0}
.circuit-corner.tl::before{top:8px;left:0;width:24px;height:1px}
.circuit-corner.tl::after{top:0;left:8px;width:1px;height:24px}
.circuit-corner.tr{top:0;right:0}
.circuit-corner.tr::before{top:8px;right:0;width:24px;height:1px}
.circuit-corner.tr::after{top:0;right:8px;width:1px;height:24px}
.device-header{position:relative;padding:28px 16px 16px;text-align:center;border-bottom:1px solid var(--trace);background:linear-gradient(180deg,rgba(0,229,204,0.04) 0%,transparent 100%)}
.device-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,var(--cyan-dim) 20%,var(--cyan) 50%,var(--cyan-dim) 80%,transparent 100%);animation:headerScan 4s ease-in-out infinite}
@keyframes headerScan{0%,100%{opacity:0.4}50%{opacity:1}}
.device-title{font-family:var(--font-display);font-size:22px;font-weight:900;letter-spacing:.35em;color:var(--amber-glow);text-shadow:0 0 10px var(--amber),0 0 30px rgba(232,160,32,.4),0 0 60px rgba(232,160,32,.15);position:relative;display:inline-block}
.device-title::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--amber),var(--cyan),var(--amber),transparent);background-size:200% 100%;animation:traceFlow 3s linear infinite}
@keyframes traceFlow{0%{background-position:200% 0}100%{background-position:-200% 0}}
.device-subtitle{font-family:var(--font-display);font-size:7px;letter-spacing:.3em;color:var(--text-secondary);margin-top:10px;text-transform:uppercase}
.device-meta{display:flex;justify-content:space-between;margin-top:10px;font-size:9px;font-family:var(--font-display);letter-spacing:.08em;color:var(--text-dim)}
.sync-time{color:var(--cyan-dim)}
.sync-time span{color:var(--cyan)}
.version-tag{color:var(--amber-dim)}
.filter-bar{display:flex;gap:2px;padding:12px 12px 0;position:relative}
.filter-bar::before{content:'';position:absolute;left:12px;right:12px;bottom:0;height:1px;background:var(--trace)}
.filter-tab{flex:1;background:none;border:1px solid var(--text-dim);color:var(--text-dim);font-family:var(--font-display);font-size:9px;letter-spacing:.2em;padding:8px 4px;cursor:pointer;transition:all .2s;text-align:center;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%)}
.filter-tab.active{border-color:var(--cyan);color:var(--cyan-glow);background:rgba(0,229,204,.08);text-shadow:0 0 8px var(--cyan);box-shadow:0 0 12px rgba(0,229,204,.2) inset}
.filter-tab:not(.active):hover{border-color:var(--text-secondary);color:var(--text-secondary)}
#list-view{padding:12px;display:flex;flex-direction:column;gap:10px}
.event-card{background:var(--surface);border:1px solid var(--trace);position:relative;cursor:pointer;transition:all .25s;overflow:hidden}
.event-card::before{content:'';position:absolute;top:0;right:0;width:16px;height:16px;background:var(--void);clip-path:polygon(0 0,100% 0,100% 100%);z-index:2}
.event-card:hover{border-color:var(--trace-bright);background:var(--surface-raised);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,229,204,.1)}
.event-card.elapsed{opacity:.45;filter:saturate(.3)}
.event-card.urgent{border-color:rgba(255,34,68,.5);animation:urgentPulse 1.5s ease-in-out infinite}
@keyframes urgentPulse{0%,100%{box-shadow:0 0 8px rgba(255,34,68,.2)}50%{box-shadow:0 0 20px rgba(255,34,68,.5)}}
.card-inner{padding:14px 12px 12px;display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:start}
.importance-badge{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:14px;font-weight:900;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);flex-shrink:0;margin-top:2px}
.badge-A{background:var(--amber-dim);color:var(--amber-glow);animation:badgePulseA 2s ease-in-out infinite}
@keyframes badgePulseA{0%,100%{box-shadow:0 0 8px var(--amber-dim);filter:brightness(1)}50%{box-shadow:0 0 20px var(--amber),0 0 40px rgba(232,160,32,.3);filter:brightness(1.3)}}
.badge-B{background:var(--cyan-dim);color:var(--cyan-glow);box-shadow:0 0 8px var(--cyan-dim)}
.badge-C{background:var(--magenta-dim);color:var(--magenta);opacity:.8}
.card-content{min-width:0}
.event-label{font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.3;margin-bottom:8px}
.countdown-display{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:.08em;color:var(--amber);text-shadow:0 0 10px rgba(232,160,32,.5);margin-bottom:6px;transition:color .5s,text-shadow .5s}
.countdown-display.urgent{color:var(--red-urgent);text-shadow:0 0 10px rgba(255,34,68,.7);animation:countdownUrgent 1s ease-in-out infinite}
@keyframes countdownUrgent{0%,100%{opacity:1}50%{opacity:.7}}
.countdown-display.elapsed-text{font-size:11px;color:var(--text-dim);text-shadow:none;letter-spacing:.25em}
.timespace-coord{font-family:var(--font-display);font-size:8px;color:var(--text-dim);letter-spacing:.05em;word-break:break-all;line-height:1.6;margin-bottom:10px}
.card-actions{display:flex;gap:6px;padding:0 12px 12px}
.btn{font-family:var(--font-display);font-size:8px;letter-spacing:.2em;padding:7px 10px;border:1px solid;background:none;cursor:pointer;transition:all .2s;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);white-space:nowrap}
.btn-navigate{border-color:var(--cyan-dim);color:var(--cyan)}
.btn-navigate:hover{background:rgba(0,229,204,.1);border-color:var(--cyan);box-shadow:0 0 8px rgba(0,229,204,.3)}
.btn-copy{border-color:var(--amber-dim);color:var(--amber)}
.btn-copy:hover{background:rgba(232,160,32,.1);border-color:var(--amber);box-shadow:0 0 8px rgba(232,160,32,.3)}
.btn-copy.copied{color:var(--cyan-glow);border-color:var(--cyan);background:rgba(0,229,204,.1)}
.btn-back{border-color:var(--text-secondary);color:var(--text-secondary)}
.btn-back:hover{border-color:var(--text-primary);color:var(--text-primary)}
.card-trace-line{height:1px;background:linear-gradient(90deg,var(--trace),var(--trace-bright),var(--trace));margin:0 12px}
#detail-view{display:none;padding:12px}
#detail-view.visible{display:block}
.detail-card{background:var(--surface);border:1px solid var(--trace-bright);position:relative;overflow:hidden}
.detail-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--amber),var(--cyan),transparent);animation:detailScan 6s linear infinite;background-size:200%}
@keyframes detailScan{0%{background-position:200%}100%{background-position:-200%}}
.detail-header{padding:16px 16px 12px;display:flex;gap:14px;align-items:flex-start}
.detail-badge{width:48px;height:48px;flex-shrink:0;font-size:20px}
.detail-label{font-family:var(--font-body);font-size:16px;font-weight:600;color:var(--text-primary);line-height:1.3;margin-bottom:4px}
.detail-importance-label{font-family:var(--font-display);font-size:8px;letter-spacing:.3em;color:var(--text-secondary)}
.detail-importance-label.imp-A{color:var(--amber)}
.detail-importance-label.imp-B{color:var(--cyan)}
.detail-importance-label.imp-C{color:var(--magenta)}
.detail-description{padding:0 16px 14px;font-size:13px;font-style:italic;color:var(--text-secondary);line-height:1.7}
.detail-readout{padding:14px 16px;background:rgba(0,0,0,.3);border-top:1px solid var(--trace);border-bottom:1px solid var(--trace)}
.readout-label{font-family:var(--font-display);font-size:7px;letter-spacing:.4em;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase}
.readout-coord{font-family:var(--font-display);font-size:11px;color:var(--cyan);letter-spacing:.06em;text-shadow:0 0 10px rgba(0,229,204,.5);word-break:break-all;line-height:1.8}
.readout-countdown{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--amber);text-shadow:0 0 20px rgba(232,160,32,.6);margin-top:12px;letter-spacing:.08em}
.readout-countdown.urgent{color:var(--red-urgent);text-shadow:0 0 20px rgba(255,34,68,.7);animation:countdownUrgent 1s ease-in-out infinite}
.readout-countdown.elapsed-text{font-size:14px;color:var(--text-dim);text-shadow:none;letter-spacing:.25em}
.detail-actions{display:flex;gap:8px;padding:14px 16px}
.detail-actions .btn{font-size:9px;padding:10px 14px}
.back-row{padding:0 0 8px}
.device-footer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;padding:8px 16px;background:linear-gradient(0deg,var(--void) 60%,transparent);display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:100}
.footer-trace{height:1px;position:absolute;top:0;left:0;right:0;background:linear-gradient(90deg,transparent,var(--trace-bright),transparent)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:statusBlink 3s ease-in-out infinite}
@keyframes statusBlink{0%,90%,100%{opacity:1}95%{opacity:.2}}
.footer-text{font-family:var(--font-display);font-size:7px;letter-spacing:.25em;color:var(--text-dim)}
.empty-state{text-align:center;padding:40px 20px;font-family:var(--font-display);font-size:9px;letter-spacing:.3em;color:var(--text-dim)}
.hidden{display:none !important}
</style>
</head>
<body>
<div id="app">
  <div class="circuit-corner tl"></div>
  <div class="circuit-corner tr"></div>
  <header class="device-header">
    <div class="device-title">ANACHRONOPE</div>
    <div class="device-subtitle">Temporal Field Device &nbsp;// Authorized Personnel Only</div>
    <div class="device-meta">
      <span class="sync-time">SYNC: <span id="sync-display">—</span></span>
      <span class="version-tag" id="version-tag">v—</span>
    </div>
  </header>
  <nav class="filter-bar" id="filter-bar">
    <button class="filter-tab active" data-filter="ALL">ALL</button>
    <button class="filter-tab" data-filter="AB">A+B</button>
    <button class="filter-tab" data-filter="A">A ONLY</button>
  </nav>
  <section id="list-view"></section>
  <section id="detail-view">
    <div class="back-row">
      <button class="btn btn-back" id="back-btn">&#8592; RETURN TO MANIFEST</button>
    </div>
    <div class="detail-card" id="detail-card"></div>
  </section>
  <footer class="device-footer">
    <div class="footer-trace"></div>
    <div class="status-dot"></div>
    <div class="footer-text">TEMPORAL DISPLACEMENT ACTIVE</div>
    <div class="footer-text" id="live-clock">--:--:--</div>
  </footer>
</div>
<script src="data.js"></script>
<script>
var currentFilter='ALL',activeDetailId=null;

function buildTimespace(iso,w3w){
  var d=new Date(iso);
  var yr=String(d.getFullYear()).padStart(5,'0');
  var mo=String(d.getMonth()+1).padStart(2,'0');
  var dy=String(d.getDate()).padStart(2,'0');
  var hr=String(d.getHours()).padStart(2,'0');
  var mn=String(d.getMinutes()).padStart(2,'0');
  return 'T///S:'+yr+'.'+mo+'.'+dy+'.'+hr+'.'+mn+'///'+w3w;
}

function countdownString(iso){
  var diff=new Date(iso).getTime()-Date.now();
  if(diff<=0)return null;
  var s=Math.floor(diff/1000);
  var dd=String(Math.floor(s/86400)).padStart(2,'0');
  var hh=String(Math.floor((s%86400)/3600)).padStart(2,'0');
  var mm=String(Math.floor((s%3600)/60)).padStart(2,'0');
  var ss=String(s%60).padStart(2,'0');
  return dd+':'+hh+':'+mm+':'+ss;
}

function isUrgent(iso){var d=new Date(iso).getTime()-Date.now();return d>0&&d<=3600000}
function isElapsed(iso){return new Date(iso).getTime()<=Date.now()}

var IMP_LABELS={A:'MANDATORY ATTENDANCE',B:'SUBPLOT EVENT',C:'HISTORICAL FOOTNOTE'};

function sortedEvents(){
  return EVENTS.slice().sort(function(a,b){
    var ae=isElapsed(a.datetime_iso),be=isElapsed(b.datetime_iso);
    if(ae&&!be)return 1;if(!ae&&be)return -1;
    return new Date(a.datetime_iso)-new Date(b.datetime_iso);
  });
}

function filterEvents(evs){
  if(currentFilter==='A')return evs.filter(function(e){return e.importance==='A'});
  if(currentFilter==='AB')return evs.filter(function(e){return e.importance==='A'||e.importance==='B'});
  return evs;
}

function renderList(){
  var container=document.getElementById('list-view');
  var evs=filterEvents(sortedEvents());
  if(!evs.length){container.innerHTML='<div class="empty-state">NO EVENTS MATCH CURRENT FILTER</div>';return}
  container.innerHTML=evs.map(function(evt){
    var elapsed=isElapsed(evt.datetime_iso);
    var urgent=isUrgent(evt.datetime_iso);
    var cd=countdownString(evt.datetime_iso);
    var ts=buildTimespace(evt.datetime_iso,evt.w3w);
    var cardCls='event-card'+(elapsed?' elapsed':'')+(urgent?' urgent':'');
    var cdCls=elapsed?'countdown-display elapsed-text':urgent?'countdown-display urgent':'countdown-display';
    var cdTxt=elapsed?'EVENT ELAPSED':cd;
    var w3wSafe=evt.w3w;
    var tsSafe=ts.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<div class="'+cardCls+'" data-id="'+evt.id+'">'+
      '<div class="card-inner">'+
      '<div class="importance-badge badge-'+evt.importance+'">'+evt.importance+'</div>'+
      '<div class="card-content">'+
      '<div class="event-label">'+evt.label+'</div>'+
      '<div class="'+cdCls+'" data-countdown="'+evt.id+'">'+cdTxt+'</div>'+
      '<div class="timespace-coord">'+ts+'</div>'+
      '</div></div>'+
      '<div class="card-trace-line"></div>'+
      '<div class="card-actions">'+
      '<button class="btn btn-navigate" onclick="navigateW3W(event,\''+w3wSafe+'\')">NAVIGATE</button>'+
      '<button class="btn btn-copy" onclick="copyCoord(event,this,\''+tsSafe+'\')">COPY COORD</button>'+
      '</div></div>';
  }).join('');
  container.querySelectorAll('.event-card').forEach(function(card){
    card.addEventListener('click',function(e){
      if(e.target.closest('.btn'))return;
      showDetail(card.dataset.id);
    });
  });
}

function showDetail(id){
  var evt=EVENTS.find(function(e){return e.id===id});
  if(!evt)return;
  activeDetailId=id;
  var elapsed=isElapsed(evt.datetime_iso);
  var urgent=isUrgent(evt.datetime_iso);
  var cd=countdownString(evt.datetime_iso);
  var ts=buildTimespace(evt.datetime_iso,evt.w3w);
  var cdCls=elapsed?'elapsed-text':urgent?'urgent':'';
  var cdTxt=elapsed?'EVENT ELAPSED':cd;
  var tsSafe=ts.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  document.getElementById('detail-card').innerHTML=
    '<div class="detail-header">'+
    '<div class="importance-badge detail-badge badge-'+evt.importance+'">'+evt.importance+'</div>'+
    '<div><div class="detail-label">'+evt.label+'</div>'+
    '<div class="detail-importance-label imp-'+evt.importance+'">'+IMP_LABELS[evt.importance]+'</div></div>'+
    '</div>'+
    '<div class="detail-description">'+evt.description+'</div>'+
    '<div class="detail-readout">'+
    '<div class="readout-label">Timespace Coordinate</div>'+
    '<div class="readout-coord">'+ts+'</div>'+
    '<div class="readout-countdown '+cdCls+'" id="detail-countdown">'+cdTxt+'</div>'+
    '</div>'+
    '<div class="detail-actions">'+
    '<button class="btn btn-navigate" onclick="navigateW3W(event,\''+evt.w3w+'\')">NAVIGATE</button>'+
    '<button class="btn btn-copy" id="detail-copy-btn" onclick="copyCoord(event,this,\''+tsSafe+'\')">COPY COORD</button>'+
    '</div>';
  document.getElementById('list-view').style.display='none';
  document.getElementById('filter-bar').style.display='none';
  document.getElementById('detail-view').classList.add('visible');
}

document.getElementById('back-btn').addEventListener('click',function(){
  activeDetailId=null;
  document.getElementById('detail-view').classList.remove('visible');
  document.getElementById('list-view').style.display='';
  document.getElementById('filter-bar').style.display='';
});

function navigateW3W(e,w3w){e.stopPropagation();window.open('https://what3words.com/'+w3w,'_blank','noopener')}

function copyCoord(e,btn,ts){
  e.stopPropagation();
  var orig=btn.textContent;
  function succeed(){btn.textContent='COPIED';btn.classList.add('copied');setTimeout(function(){btn.textContent=orig;btn.classList.remove('copied')},1500)}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(ts).then(succeed).catch(function(){fallbackCopy(ts,succeed)});
  }else{fallbackCopy(ts,succeed)}
}

function fallbackCopy(text,cb){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');cb()}catch(e){}
  document.body.removeChild(ta);
}

document.getElementById('filter-bar').querySelectorAll('.filter-tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    currentFilter=tab.dataset.filter;
    document.querySelectorAll('.filter-tab').forEach(function(t){t.classList.remove('active')});
    tab.classList.add('active');
    renderList();
  });
});

function tickCountdowns(){
  document.querySelectorAll('[data-countdown]').forEach(function(el){
    var id=el.dataset.countdown;
    var evt=EVENTS.find(function(e){return e.id===id});
    if(!evt)return;
    var elapsed=isElapsed(evt.datetime_iso);
    var urgent=isUrgent(evt.datetime_iso);
    var card=el.closest('.event-card');
    if(elapsed){
      el.textContent='EVENT ELAPSED';el.className='countdown-display elapsed-text';
      if(card){card.classList.add('elapsed');card.classList.remove('urgent')}
    }else{
      el.textContent=countdownString(evt.datetime_iso);
      el.className=urgent?'countdown-display urgent':'countdown-display';
      if(card){card.classList.toggle('urgent',urgent);card.classList.remove('elapsed')}
    }
  });
  if(activeDetailId){
    var evt=EVENTS.find(function(e){return e.id===activeDetailId});
    var el=document.getElementById('detail-countdown');
    if(evt&&el){
      var elapsed=isElapsed(evt.datetime_iso);
      var urgent=isUrgent(evt.datetime_iso);
      if(elapsed){el.textContent='EVENT ELAPSED';el.className='readout-countdown elapsed-text'}
      else{el.textContent=countdownString(evt.datetime_iso);el.className='readout-countdown'+(urgent?' urgent':'')}
    }
  }
  var n=new Date();
  document.getElementById('live-clock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
}

function checkRefresh(){
  var cfg=ANACHRONOPE_CONFIG;
  if(Date.now()>=new Date(cfg.refresh_at_iso).getTime()&&localStorage.getItem('last_refresh')!==cfg.refresh_at_iso){
    localStorage.setItem('last_refresh',cfg.refresh_at_iso);
    window.location.reload(true);
  }
}

function init(){
  var cfg=ANACHRONOPE_CONFIG;
  document.getElementById('version-tag').textContent='v'+cfg.version;
  var sd=new Date(cfg.refresh_at_iso);
  document.getElementById('sync-display').textContent=
    sd.getFullYear()+'.'+String(sd.getMonth()+1).padStart(2,'0')+'.'+String(sd.getDate()).padStart(2,'0')+
    ' '+String(sd.getHours()).padStart(2,'0')+':'+String(sd.getMinutes()).padStart(2,'0');
  renderList();checkRefresh();
  setInterval(tickCountdowns,1000);tickCountdowns();
  setInterval(checkRefresh,60000);
}

document.addEventListener('DOMContentLoaded',init);
</script>
